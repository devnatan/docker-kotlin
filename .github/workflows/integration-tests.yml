name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:

env:
  DOCKER_API_VERSION: 1.48
  DOCKER_CE_VERSION: 28.3.3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  jvm:
    runs-on: ubuntu-24.04
    name: JVM
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Docker CE
        uses: docker/setup-docker-action@v4.6.0
        with:
          version: v${{ env.DOCKER_CE_VERSION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Prune Docker System
        run: docker system prune -a -f

      - name: Run Tests
        run: ./gradlew jvmTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-jvm
          path: build/reports/tests/
  native:
    if: ${{ vars.NATIVE_TESTS_ENABLED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux
            runner: ubuntu-24.04
            sourceset: linuxX64

          - name: macOS
            runner: macos-15-intel
            sourceset: macosX64

          - name: Windows
            runner: windows-2025
            sourceset: mingwX64

    runs-on: ${{ matrix.os.runner }}
    name: Native - ${{ matrix.os.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Docker CE
        uses: docker/setup-docker-action@v4.6.0
        if: ${{ matrix.os.sourceset != 'macosArm64' }}
        with:
          version: v${{ env.DOCKER_CE_VERSION }}

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master
        if: ${{ matrix.os.sourceset == 'macosArm64' }}

      - name: Setup Docker
        if: ${{ matrix.os.sourceset == 'macosArm64' }}
        run: |
          brew install colima docker
          colima start

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Prune Docker System
        run: docker system prune -a -f

      - name: Run Tests
        run: ./gradlew ${{ matrix.os.sourceset }}Test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os.sourceset }}
          path: build/reports/tests/
